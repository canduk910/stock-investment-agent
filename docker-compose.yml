# 로컬 개발용 도커 구성 — 백엔드(FastAPI:8000) + 프론트(Vite:5173).
#   기동:  docker compose up --build   →   http://localhost:5173
#   중지:  docker compose down
# 시크릿은 이미지에 굽지 않고 .env 를 런타임 주입(env_file). .env 는 .gitignore/.dockerignore 대상.
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev   # 로컬 개발용(--reload). 프로덕션(Cloud Run)은 루트 Dockerfile.
    container_name: sia-backend
    env_file: .env                 # KIS/FRED/DART/OPENAI 키를 런타임 주입(이미지에 미포함)
    ports:
      - "8000:8000"
    volumes:
      - ./:/app                    # 소스 핫리로드(uvicorn --reload)
      - backend-venv:/app/.venv    # 컨테이너(Linux) .venv 보존 — 호스트(mac) .venv 로 덮이지 않게

  frontend:
    build: ./frontend
    container_name: sia-frontend
    environment:
      - VITE_PROXY_TARGET=http://backend:8000  # 컨테이너 네트워크에서 백엔드 서비스명으로 프록시
      - VITE_USE_POLLING=1                       # 도커 볼륨 파일감시 폴링(HMR 안정화)
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # 빈 익명 볼륨으로 호스트(mac) node_modules 를 가린다. 실제 의존성은 이미지가 바인드마운트
      # '한 단계 위'(/node_modules)에 굽고 Node/Vite 가 상위로 올라가 해석 → stale named volume 이
      # 없어 이미지 재빌드마다 자동 최신. 의존성 추가 후 `docker compose up --build` 만으로 반영.
      - /app/node_modules
    depends_on:
      - backend

volumes:
  backend-venv:
